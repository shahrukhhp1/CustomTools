name: Deploy (FTP)

on:
  workflow_dispatch:
  # Uncomment below to auto-deploy on push to main
  # push:
  #   branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest
    env:
      FTP_SERVER: win8123.site4now.net
      FTP_USERNAME: tools_shahrukh
      FTP_PASSWORD: Axact123
      FTP_REMOTE_DIR: ./

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        # Needed so git diff can see a base commit
        fetch-depth: 0

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore NuGet packages
      run: dotnet restore CustomWebTools.sln

    - name: Detect static asset changes (wwwroot)
      shell: pwsh
      run: |
        # Determine a base commit to diff against.
        # - On push: github.event.before is available
        # - On workflow_dispatch: fall back to HEAD~1 (if present)
        $base = "${{ github.event.before }}"
        if ([string]::IsNullOrWhiteSpace($base) -or $base -eq "0000000000000000000000000000000000000000") {
          try { $base = (git rev-parse HEAD~1).Trim() } catch { $base = "" }
        }

        $staticChanged = $true
        if (-not [string]::IsNullOrWhiteSpace($base)) {
          $files = (git diff --name-only $base $env:GITHUB_SHA) -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ }
          $staticChanged = $files | Where-Object { $_ -like "wwwroot/*" } | ForEach-Object { $true } | Select-Object -First 1
          if ($null -eq $staticChanged) { $staticChanged = $false }
        }

        if ($staticChanged) {
          Write-Host "wwwroot changes detected (or base unknown): will deploy static assets."
          "STATIC_CHANGED=true" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        } else {
          Write-Host "No wwwroot changes detected: will skip deploying static assets."
          "STATIC_CHANGED=false" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
        }

    - name: Build and Publish
      run: dotnet publish CustomWebTools.sln -c Release -o ./_build --no-restore

    - name: Skip static assets when unchanged
      if: env.STATIC_CHANGED == 'false'
      shell: pwsh
      run: |
        if (Test-Path "./_build/wwwroot") {
          Remove-Item -Path "./_build/wwwroot" -Recurse -Force
          Write-Host "Removed _build/wwwroot (static assets unchanged)."
        }

    - name: Put site in maintenance mode (app_offline.htm)
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "./_maintenance" | Out-Null
        @"
        <!doctype html>
        <html lang="en">
        <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <title>Deploying…</title>
          <style>
            body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 32px; }
            .box { max-width: 720px; margin: 0 auto; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px 20px; background: #fff; }
            h1 { margin: 0 0 8px 0; font-size: 20px; }
            p { margin: 0; color: #4b5563; }
          </style>
        </head>
        <body>
          <div class="box">
            <h1>Deploying an update…</h1>
            <p>This site will be back shortly.</p>
          </div>
        </body>
        </html>
        "@ | Set-Content -Path "./_maintenance/app_offline.htm" -Encoding UTF8

    - name: Upload app_offline.htm (single-file upload)
      shell: pwsh
      run: |
        pwsh ./scripts/ftp.ps1 `
          -Action upload `
          -Server "$env:FTP_SERVER" `
          -Username "$env:FTP_USERNAME" `
          -Password "$env:FTP_PASSWORD" `
          -RemoteDir "$env:FTP_REMOTE_DIR" `
          -RemoteFile "app_offline.htm" `
          -LocalPath "./_maintenance/app_offline.htm"

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ env.FTP_SERVER }}
        username: ${{ env.FTP_USERNAME }}
        password: ${{ env.FTP_PASSWORD }}
        local-dir: ./_build/
        server-dir: ${{ env.FTP_REMOTE_DIR }}
        dangerous-clean-slate: false
        # app_offline.htm is managed by dedicated steps above
        exclude: |
          app_offline.htm

    - name: Bring site back online (delete app_offline.htm)
      shell: pwsh
      if: always()
      run: |
        pwsh ./scripts/ftp.ps1 `
          -Action delete `
          -Server "$env:FTP_SERVER" `
          -Username "$env:FTP_USERNAME" `
          -Password "$env:FTP_PASSWORD" `
          -RemoteDir "$env:FTP_REMOTE_DIR" `
          -RemoteFile "app_offline.htm"
