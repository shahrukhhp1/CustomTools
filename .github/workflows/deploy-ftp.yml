name: Deploy (FTP)

on:
  workflow_dispatch:
  # Uncomment below to auto-deploy on push to main
  # push:
  #   branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET 8 SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore NuGet packages
      run: dotnet restore CustomWebTools.sln

    - name: Build and Publish
      run: dotnet publish CustomWebTools.sln -c Release -o ./_build --no-restore

    - name: Put site in maintenance mode (app_offline.htm)
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "./_maintenance" | Out-Null
        @"
        <!doctype html>
        <html lang="en">
        <head>
          <meta charset="utf-8" />
          <meta name="viewport" content="width=device-width, initial-scale=1" />
          <title>Deploying…</title>
          <style>
            body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 32px; }
            .box { max-width: 720px; margin: 0 auto; border: 1px solid #e5e7eb; border-radius: 14px; padding: 18px 20px; background: #fff; }
            h1 { margin: 0 0 8px 0; font-size: 20px; }
            p { margin: 0; color: #4b5563; }
          </style>
        </head>
        <body>
          <div class="box">
            <h1>Deploying an update…</h1>
            <p>This site will be back shortly.</p>
          </div>
        </body>
        </html>
        "@ | Set-Content -Path "./_maintenance/app_offline.htm" -Encoding UTF8

    - name: Upload app_offline.htm
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: win8123.site4now.net
        username: tools_shahrukh
        password: Axact123
        local-dir: ./_maintenance/
        server-dir: ./
        dangerous-clean-slate: false

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: win8123.site4now.net
        username: tools_shahrukh
        password: Axact123
        local-dir: ./_build/
        server-dir: ./
        dangerous-clean-slate: false
        # Keep the server's existing IIS settings (hostingModel, env vars, etc.)
        exclude: |
          web.config
          **/web.config

    - name: Bring site back online (delete app_offline.htm)
      shell: pwsh
      run: |
        $server = "win8123.site4now.net"
        $user = "tools_shahrukh"
        $pass = "Axact123"
        $remoteDir = "./"

        $dir = $remoteDir.Trim()
        if ([string]::IsNullOrWhiteSpace($dir) -or $dir -eq "." -or $dir -eq "./" -or $dir -eq "/") {
          $dir = ""
        } else {
          $dir = $dir.Trim("/").TrimEnd("/") + "/"
        }

        $appOffline = "app_offline.htm"
        $fileUri = "ftp://$server/$dir$appOffline"

        function Try-DeleteFtpFile([string]$uri, [bool]$enableSsl) {
          try {
            $req = [System.Net.FtpWebRequest]::Create($uri)
            $req.Method = [System.Net.WebRequestMethods+Ftp]::DeleteFile
            $req.Credentials = New-Object System.Net.NetworkCredential($user, $pass)
            $req.UsePassive = $true
            $req.UseBinary = $true
            $req.KeepAlive = $false
            $req.Timeout = 15000
            $req.ReadWriteTimeout = 15000
            $req.EnableSsl = $enableSsl

            $resp = $req.GetResponse()
            $resp.Close()
            return @{ ok = $true; notFound = $false; msg = "deleted" }
          }
          catch [System.Net.WebException] {
            $r = $_.Exception.Response
            if ($r -is [System.Net.FtpWebResponse]) {
              $code = $r.StatusCode
              $desc = $r.StatusDescription
              $r.Close()
              if ($code -eq [System.Net.FtpStatusCode]::ActionNotTakenFileUnavailable) {
                return @{ ok = $false; notFound = $true; msg = $desc }
              }
              return @{ ok = $false; notFound = $false; msg = "$code $desc" }
            }
            return @{ ok = $false; notFound = $false; msg = $_.Exception.Message }
          }
          catch {
            return @{ ok = $false; notFound = $false; msg = $_.Exception.Message }
          }
        }

        Write-Host "Attempting to delete $fileUri"

        # Small wait helps avoid transient locks when IIS is serving the offline page.
        Start-Sleep -Seconds 2

        for ($i = 1; $i -le 8; $i++) {
          $r = Try-DeleteFtpFile -uri $fileUri -enableSsl $false
          if ($r.ok) { Write-Host "Deleted app_offline.htm (FTP)."; exit 0 }
          if ($r.notFound) { Write-Host "app_offline.htm not found (already removed)."; exit 0 }

          $r2 = Try-DeleteFtpFile -uri $fileUri -enableSsl $true
          if ($r2.ok) { Write-Host "Deleted app_offline.htm (FTPS)."; exit 0 }
          if ($r2.notFound) { Write-Host "app_offline.htm not found (already removed)."; exit 0 }

          Write-Host "Delete attempt $i failed. FTP: $($r.msg) | FTPS: $($r2.msg)"
          Start-Sleep -Seconds ([Math]::Min(20, 2 * $i))
        }

        throw "Failed to delete app_offline.htm after retries. You may need to remove it manually via FTP."
